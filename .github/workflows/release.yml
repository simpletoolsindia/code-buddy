name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/code-buddy

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/code-buddy dist/code-buddy
          cp README.md install.sh dist/
          cd dist
          tar czf ../code-buddy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          cd ..
          sha256sum code-buddy-${{ github.ref_name }}-${{ matrix.target }}.tar.gz >> checksums.txt

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/code-buddy.exe dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath "code-buddy-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $hash = (Get-FileHash "code-buddy-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  code-buddy-${{ github.ref_name }}-${{ matrix.target }}.zip" >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            code-buddy-*
            checksums.txt

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/checksums.txt > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/code-buddy-*.tar.gz
            artifacts/code-buddy-*.zip
            checksums.txt
          generate_release_notes: true
          body: |
            ## Install

            ### Linux / macOS (one-line)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/simpletoolsindia/code-buddy/main/install.sh | sh
            ```

            ### Windows (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/simpletoolsindia/code-buddy/main/install.ps1 | iex
            ```

            ### Homebrew
            ```bash
            brew install simpletoolsindia/tap/code-buddy
            ```

            ### Cargo
            ```bash
            cargo install --git https://github.com/simpletoolsindia/code-buddy code-buddy
            ```

            See [README.md](README.md) for full setup and configuration.
